site_name: allwrite
site_description: Documentation for the allwrite CLI and recipe library
site_url: https://allegro.github.io/allwrite/
repo_url: https://github.com/allegro/allwrite
repo_name: allegro/allwrite
copyright: Copyright &copy; Allegro
theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  icon:
    logo: material/auto-fix
plugins:
  - search
  - awesome-pages
nav:
  - Overview: index.md
  - CLI reference: cli.md
  - Writing recipes: contributing.md
  - Recipes reference: recipes.md
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
extra_css:
  - stylesheets/extra.css
